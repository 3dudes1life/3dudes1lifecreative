<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#3a1038">
  <title>Offline | 3Dudes1Life Creative</title>
  <style>
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0}
    body{
      display:grid;place-items:center;padding:24px;
      color:#fff;font-family:system-ui,-apple-system,sans-serif;text-align:center;
      background:
        radial-gradient(circle at 10% 0,rgba(255,79,216,.24),transparent 38%),
        radial-gradient(circle at 100% 100%,rgba(67,206,162,.20),transparent 40%),
        linear-gradient(135deg,#30102d,#11131a 52%,#082434);
    }
    main{width:min(100%,620px);padding:34px;border:1px solid rgba(255,255,255,.13);border-radius:28px;background:rgba(17,19,26,.78);box-shadow:0 24px 70px rgba(0,0,0,.42)}
    img{width:86px;height:86px;object-fit:contain;border-radius:22px}
    h1{margin:18px 0 10px;font-size:clamp(2rem,8vw,3.2rem)}
    p{margin:0 auto 22px;max-width:470px;color:#cdd5df;line-height:1.6}
    a,button{min-height:50px;display:inline-flex;align-items:center;justify-content:center;padding:0 20px;border:0;border-radius:999px;color:#fff;text-decoration:none;font-weight:900;background:linear-gradient(135deg,#ff4fd8,#ff9f1c);cursor:pointer}
  </style>
</head>
<body>
  <main>
    <img src="/app-icon.png" alt="3Dudes1Life Creative">
    <h1>You’re offline — not disconnected.</h1>
    <p>The core app is still here. Reconnect to load the newest podcast episode, photos, maps, and updates.</p>
    <button onclick="location.reload()">Try Again</button>
  </main>
</body>
</html>
